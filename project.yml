name: Colophon
options:
  bundleIdPrefix: com.andrewthom
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true
packages:
  ABSKit:
    path: Packages/ABSKit
  PlayerEngine:
    path: Packages/PlayerEngine
  LibraryCache:
    path: Packages/LibraryCache
targets:
  Colophon:
    type: application
    supportedDestinations: [iOS, macOS]
    sources: [App]
    dependencies:
      - package: ABSKit
      - package: ABSKit
        product: ABSRealtime
      - package: PlayerEngine
      - package: LibraryCache
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewthom.colophon
        DEVELOPMENT_TEAM: LL334G7KP2
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Colophon
        SWIFT_VERSION: "6.2"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        ENABLE_USER_SCRIPT_SANDBOXING: true
        CODE_SIGN_ENTITLEMENTS: App/Colophon.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Colophon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIBackgroundModes: [audio]
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "Colophon connects to your Audiobookshelf server, which may be on your local network."
schemes:
  Colophon:
    build:
      targets: { Colophon: all }
