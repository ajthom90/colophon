name: Colophon
options:
  bundleIdPrefix: com.andrewthom
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true
packages:
  ABSKit:
    path: Packages/ABSKit
  PlayerEngine:
    path: Packages/PlayerEngine
  LibraryCache:
    path: Packages/LibraryCache
  DownloadManager:
    path: Packages/DownloadManager
  ColophonShared:
    path: Packages/ColophonShared
  # GRDB is a transitive dependency of LibraryCache whose public `AsyncValueObservation` API
  # leaks GRDB types into the app's own object files. The plain build action links it via
  # eager-linking response files, but the test-host app link drops those transitive inputs and
  # fails on undefined GRDB symbols — so the app must depend on GRDB explicitly.
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
targets:
  Colophon:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: App
        excludes:
          - ColophonTests
      # The playback App Intents (M2b Task 3) are compiled into BOTH the app and the widget extension
      # (see the ColophonWidgets target) so the app's App Intents metadata includes them — the system
      # routes `perform()` to the running app process, where the live-player `@Dependency` is
      # registered — while the Control Center control (in the extension) references the same intents.
      - path: SharedIntents
      # The now-playing Live Activity's ActivityKit attributes (M2b Task 4), compiled into BOTH the app
      # (which manages the Activity) and the extension (which renders it). iOS-only inside the file
      # (`#if os(iOS)`), so it compiles away on the macOS app build.
      - path: SharedActivity
    dependencies:
      - package: ABSKit
      - package: ABSKit
        product: ABSRealtime
      - package: PlayerEngine
      - package: LibraryCache
      - package: DownloadManager
      - package: ColophonShared
      - package: GRDB
        product: GRDB
      # Embed the WidgetKit extension into the app (iOS ONLY). `platformFilter: iOS` stamps the
      # "Embed Foundation Extensions" copy-files build FILE with `platformFilter = ios`, so the embed
      # runs only for the iOS variant of this multi-platform (`supportedDestinations: [iOS, macOS]`)
      # target; the macOS variant skips it. Combined with the extension's own
      # `supportedDestinations: [iOS]` (xcodebuild skips building an iOS-only dependency for the macOS
      # destination), this keeps `make build-mac` GREEN. NOTE: XcodeGen's dependency `platforms: [iOS]`
      # was tried first and DROPPED the embed + dependency entirely under `supportedDestinations`;
      # `platformFilter` is the stanza that actually works here.
      - target: ColophonWidgets
        embed: true
        platformFilter: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewthom.colophon
        DEVELOPMENT_TEAM: LL334G7KP2
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Colophon
        SWIFT_VERSION: "6.2"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        ENABLE_USER_SCRIPT_SANDBOXING: true
        CODE_SIGN_ENTITLEMENTS: App/Colophon.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Colophon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIBackgroundModes: [audio]
        # Required for the now-playing Live Activity (M2b Task 4). Harmless/ignored on macOS.
        NSSupportsLiveActivities: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "Colophon connects to your Audiobookshelf server, which may be on your local network."
        CFBundleURLTypes:
          - CFBundleURLName: com.andrewthom.colophon.oauth
            CFBundleURLSchemes: [colophon]
  # The WidgetKit widget extension (M2b companions foundation). iOS-ONLY
  # (`supportedDestinations: [iOS]`) so it never enters the macOS build — the app embeds it via a
  # `platforms: [iOS]`-filtered dependency (see the Colophon target above), keeping `make build-mac`
  # green. Reads the shared snapshot the app publishes through `ColophonShared` + the App Group.
  ColophonWidgets:
    type: app-extension
    supportedDestinations: [iOS]
    sources:
      - Widgets
      # The playback App Intents (M2b Task 3), shared with the app target — so the Control Center
      # control (`PlayPauseControlWidget`, in Widgets/) can reference `SetPlaybackIntent`.
      - SharedIntents
      # The Live Activity's ActivityKit attributes (M2b Task 4), shared with the app target so the
      # extension's `NowPlayingLiveActivity` renders the same `NowPlayingActivityAttributes` the app
      # manages.
      - SharedActivity
    dependencies:
      - package: ColophonShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewthom.colophon.widgets
        DEVELOPMENT_TEAM: LL334G7KP2
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Widgets/ColophonWidgets.entitlements
        PRODUCT_NAME: ColophonWidgets
        SWIFT_VERSION: "6.2"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        ENABLE_USER_SCRIPT_SANDBOXING: true
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        # WidgetKit extensions are UI-bearing; SwiftUI previews/asset catalogs aren't needed for the
        # scaffold. The generated Info.plist below declares the widget extension point.
        SKIP_INSTALL: true
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Colophon Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  ColophonTests:
    type: bundle.unit-test
    # iOS-only: this hosted bundle runs on the iOS Simulator via `make test-app`. See the
    # Task 3 report — a multi-destination test bundle is deferred (the state-machine coverage
    # is platform-independent, so one simulator run is sufficient).
    supportedDestinations: [iOS]
    sources: [App/ColophonTests]
    dependencies:
      - target: Colophon
      - package: ABSKit
        product: ABSKit
      - package: ABSKit
        product: ABSKitTestSupport
      - package: ABSKit
        product: ABSRealtime
      - package: LibraryCache
      - package: PlayerEngine
      - package: DownloadManager
      # Same transitive-symbol leak the Colophon target hits: `observeLibraries` returns GRDB's
      # `AsyncValueObservation`, whose iterator symbols surface in this bundle's object files when
      # a test drives the observation directly. Link GRDB explicitly so they resolve.
      - package: GRDB
        product: GRDB
    settings:
      base:
        SWIFT_VERSION: "6.2"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Colophon.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Colophon
        BUNDLE_LOADER: $(TEST_HOST)
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewthom.colophonTests
        DEVELOPMENT_TEAM: LL334G7KP2
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
schemes:
  Colophon:
    build:
      targets: { Colophon: all }
    test:
      targets:
        - ColophonTests
